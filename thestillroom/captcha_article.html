<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Prove You're Human - embedded article.">
  <title>Prove You're Human - The Still Room</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .embedded-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0;
    }

    .embedded-article {
      width: 100%;
      min-height: 1200px;
      border: 0;
      display: block;
      background: #f7f4ee;
    }
  </style>
</head>
<body>
  <a class="skip-link ui" href="#content">Skip to content</a>

  <header class="site-header">
    <div class="header-inner ui">
      <a class="brand" href="index.html" aria-label="The Still Room home">
        <p class="brand-title">The Still Room</p>
        <p class="brand-subtitle">A quiet reading room</p>
      </a>
      <nav aria-label="Primary">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="archive.html">Archive</a></li>
          <li><a href="wander.html">Wander</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="content" class="embedded-wrap">
    <iframe
      id="captchaFrame"
      class="embedded-article"
      src="captcha_inner.html"
      title="Prove You're Human article"
      loading="lazy"
    ></iframe>
  </main>

  <footer class="site-footer">
    <div class="footer-inner ui">© 2026 The Still Room</div>
  </footer>

  <script>
    (function () {
      var frame = document.getElementById("captchaFrame");

      function resizeFrame() {
        if (!frame || !frame.contentWindow || !frame.contentWindow.document) {
          return;
        }

        var doc = frame.contentWindow.document;
        var height = Math.max(
          doc.body ? doc.body.scrollHeight : 0,
          doc.documentElement ? doc.documentElement.scrollHeight : 0
        );

        if (height > 0) {
          frame.style.height = height + "px";
        }
      }

      frame.addEventListener("load", function () {
        resizeFrame();
        setTimeout(resizeFrame, 150);
      });

      window.addEventListener("resize", resizeFrame);
    })();
  </script>
</body>
</html>
